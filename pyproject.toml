[project]
name = "agentcity"
version = "0.0.6"
description = "Organizational behavior, practiced on AI agents."
readme = "README.md"
requires-python = ">=3.11"
license = { file = "LICENSE" }
authors = [{ name = "Ilhan Valani", email = "valani@bu.edu" }]
keywords = [
    "ai",
    "agents",
    "after-action-review",
    "organizational-behavior",
    "multi-agent",
    "lencioni",
    "edmondson",
    "psychological-safety",
    "feedback",
    "devils-advocate",
    "lewin",
    "attribution",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "pydantic>=2.6.0",
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.40.0"]
openai = ["openai>=1.50.0"]
all = ["agentcity[anthropic,openai]"]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.6.0",
    "mypy>=1.11.0",
]

[project.urls]
Homepage = "https://github.com/valani9/AgentCity"
Repository = "https://github.com/valani9/AgentCity"
Issues = "https://github.com/valani9/AgentCity/issues"

[project.scripts]
agentcity = "agentcity.aar.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# The repo is organized by module + pattern number (module-2-team/30-...)
# but the published Python package presents the conventional `agentcity.*`
# import surface. `force-include` rewrites the paths at build time so the
# wheel ships `agentcity/aar/...` even though the source lives elsewhere.
# New patterns add another entry here on the same pattern.
[tool.hatch.build.targets.wheel]
only-include = []

[tool.hatch.build.targets.wheel.force-include]
"module-2-team/30-aar-generator/lib" = "agentcity/aar"
"module-2-team/17-lencioni-diagnostic/lib" = "agentcity/lencioni"
"module-2-team/18-trust-triangle-audit/lib" = "agentcity/trust_triangle"
"module-1-individual/03-johari-window/lib" = "agentcity/johari"
"module-2-team/13-grpi-working-agreement/lib" = "agentcity/grpi"
"module-2-team/27-bias-stack-detector/lib" = "agentcity/bias_stack"
"module-2-team/20-edmondson-psych-safety/lib" = "agentcity/psych_safety"
"module-2-team/29-thomas-kilmann-selector/lib" = "agentcity/thomas_kilmann"
"module-2-team/22-stone-heen-feedback-triggers/lib" = "agentcity/feedback_triggers"
"module-2-team/28-devils-advocate-separator/lib" = "agentcity/devils_advocate"
"module-1-individual/01-lewin-formula/lib" = "agentcity/lewin"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
