name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          # Install agentcity in editable mode so `from agentcity.aar import ...`
          # and `from agentcity.lencioni import ...` resolve in tests.
          python -m pip install -e .
          python -m pip install pytest pytest-cov pyyaml

      - name: Run tests (all patterns)
        run: |
          pytest module-1-individual/ module-2-team/ -v --tb=short

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install ruff
        run: python -m pip install ruff

      - name: Run ruff check
        run: ruff check module-1-individual/ module-2-team/

      - name: Run ruff format check
        run: ruff format --check module-1-individual/ module-2-team/

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install mypy and dependencies
        run: |
          python -m pip install mypy pydantic
          # Install the package so cross-pattern imports
          # (e.g. agentcity.aar._retry from agentcity.lencioni) resolve.
          python -m pip install -e .

      - name: Run mypy per-pattern
        # Each pattern's lib is its own logical package (via pyproject's
        # force-include mapping). Running mypy across all patterns at once
        # produces a 'Duplicate module named "lib"' error; running each
        # pattern's lib separately avoids that and gives clearer per-pattern
        # output. New patterns add another line here.
        run: |
          set -e
          for pattern in \
              module-2-team/30-aar-generator \
              module-2-team/17-lencioni-diagnostic \
              module-2-team/18-trust-triangle-audit \
              module-1-individual/03-johari-window \
              module-2-team/13-grpi-working-agreement \
              module-2-team/27-bias-stack-detector \
              module-2-team/20-edmondson-psych-safety \
              module-2-team/29-thomas-kilmann-selector \
              module-2-team/22-stone-heen-feedback-triggers \
              module-2-team/28-devils-advocate-separator \
              module-1-individual/01-lewin-formula \
              module-2-team/19-mcallister-trust-dimensions \
              module-2-team/15-social-loafing-detector \
              module-2-team/26-groupthink-polarization-contagion; do
            echo "=== mypy: $pattern ==="
            mypy "$pattern/lib" --strict --ignore-missing-imports
          done

  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build
        run: python -m pip install build

      - name: Build
        run: python -m build

      - name: Verify wheel contents
        run: |
          python -m pip install dist/agentcity-*-py3-none-any.whl
          python -c "from agentcity.aar import AARGenerator, AgentTrace, TraceStep; print('OK')"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 14
