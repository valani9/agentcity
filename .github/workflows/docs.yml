name: Docs

# Build the mkdocs-material site and publish it to GitHub Pages.
#
# Runs on every push to main + on manual dispatch. The workflow uses
# the GitHub Pages "actions" deployment source (Settings -> Pages ->
# Source: "GitHub Actions") -- no gh-pages branch is required.
#
# To enable Pages for this repo the first time:
#   Settings -> Pages -> Build and deployment -> Source: GitHub Actions
# Then push to main; the deploy step will publish the site at
#   https://valani9.github.io/vstack/

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build mkdocs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install mkdocs + theme
        run: |
          python -m pip install --upgrade pip
          python -m pip install mkdocs mkdocs-material pymdown-extensions

      - name: Build site
        run: mkdocs build --strict --site-dir _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
